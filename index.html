<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videojoc</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body onload="inicializar()">
    <canvas id="pantalla" height="800" width="1600" style="border: 5px solid rgb(40, 40, 40);"></canvas>
    <div class="instructions">
        <h1><u>INSTRUCCIONES</u></h1>
        <ul>
            <li><strong>Usa P para pausar el juego.</strong></li>
            <li><strong>Usa ESC para saltar textos en pantalla.</strong></li>
            <li><strong>Usa E para interactuar (puertas, bancos, etc).</strong></li>
            <li><strong>Banco: nuevo checkpoint.</strong></li>
            <li><u><strong>MODO BOSS:</strong></u></li>
            <li><strong>Usa X/M para atacar derecha.</strong></li>
            <li><strong>Usa Z/N para atacar izquierda.</strong></li>
        </ul>
    </div>
</body>
<script src="./script.js"></script>
</html>
